services:
  backend:
    build:
      context: ../../backend/dahaeng
      dockerfile: Dockerfile
    container_name: dahaeng-backend
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Seoul}
    restart: unless-stopped
    networks:
      - app-internal
      - db-external
    expose:
      - "8080"

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_ENABLE_MSW: ${VITE_ENABLE_MSW:-false}
    container_name: dahaeng-frontend
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - app-internal

  danger-worker:
    build:
      context: ../../data/danger
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Seoul}
      APP_RUNTIME: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE:-dahaeng}
    restart: "no"
    profiles: ["workers"]
    networks:
      - db-external

  exchange-worker:
    build:
      context: ../../data/exchange
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Seoul}
      APP_RUNTIME: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE:-dahaeng}
    restart: "no"
    profiles: ["workers"]
    networks:
      - db-external

  livingcost-worker:
    build:
      context: ../../data/livingcost
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Seoul}
      APP_RUNTIME: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE:-dahaeng}
    restart: "no"
    networks:
      - db-external
    profiles: ["workers"]

networks:
  app-internal:
    driver: bridge

  db-external:
    external: true
    name: ${DB_EXTERNAL_NETWORK:-dahaeng-db-net}
