services:
  flight-data-worker:
    build:
      context: ../..
      dockerfile: deploy/data/Dockerfile
    env_file:
      - ${WORKER_ENV_FILE:-.env}
    environment:
      TZ: ${TZ:-Asia/Seoul}
      DB_URL: ${DB_URL:-jdbc:mysql://mysql:3306/dahaeng}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/dahaeng}
    restart: "no"
    working_dir: /workspace
    volumes:
      - ../..:/workspace
    networks:
      - db-external

  danger-worker:
    build:
      context: ../../data/danger
      dockerfile: Dockerfile
    env_file:
      - ${WORKER_ENV_FILE:-.env}
    environment:
      TZ: ${TZ:-Asia/Seoul}
      APP_RUNTIME: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE:-dahaeng}
    restart: "no"
    networks:
      - db-external

  exchange-worker:
    build:
      context: ../../data/exchange
      dockerfile: Dockerfile
    env_file:
      - ${WORKER_ENV_FILE:-.env}
    environment:
      TZ: ${TZ:-Asia/Seoul}
      APP_RUNTIME: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE:-dahaeng}
    restart: "no"
    networks:
      - db-external

  livingcost-worker:
    build:
      context: ../../data/livingcost
      dockerfile: Dockerfile
    env_file:
      - ${WORKER_ENV_FILE:-.env}
    environment:
      TZ: ${TZ:-Asia/Seoul}
      APP_RUNTIME: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE:-dahaeng}
    restart: "no"
    networks:
      - db-external

networks:
  db-external:
    external: true
    name: ${DB_EXTERNAL_NETWORK:-dahaeng-db-net}
